<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>เครื่องมือช่วยกรอกคะแนน SGS</title>
  <style>
    body {
      width: 300px;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .menu {
      display: flex;
      flex-direction: column;
      gap: 1px;
      background-color: #f0f0f0;
    }
    .menu-button {
      width: 100%;
      padding: 12px;
      border: none;
      background-color: #ffffff;
      color: #333;
      cursor: pointer;
      transition: background-color 0.2s;
      text-align: left;
      font-size: 14px;
    }
    .menu-button:hover {
      background-color: #e9e9e9;
    }
  </style>
</head>
<body>
  <div class="menu">
    <button id="openSgs" class="menu-button">บันทึกผลการเรียน ตลอดภาคเรียนใน SGS</button>
    <button id="showDevInfo" class="menu-button">เกี่ยวกับปลั๊กอิน</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
