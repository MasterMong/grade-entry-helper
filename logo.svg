<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Spreadsheet grid background -->
  <rect x="16" y="20" width="96" height="80" fill="#ffffff" rx="8" ry="8" stroke="#4CAF50" stroke-width="3"/>
  
  <!-- Grid lines (horizontal) -->
  <line x1="20" y1="35" x2="108" y2="35" stroke="#4CAF50" stroke-width="2"/>
  <line x1="20" y1="50" x2="108" y2="50" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="20" y1="65" x2="108" y2="65" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="20" y1="80" x2="108" y2="80" stroke="#E0E0E0" stroke-width="1"/>
  
  <!-- Grid lines (vertical) -->
  <line x1="35" y1="24" x2="35" y2="96" stroke="#4CAF50" stroke-width="2"/>
  <line x1="55" y1="24" x2="55" y2="96" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="75" y1="24" x2="75" y2="96" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="95" y1="24" x2="95" y2="96" stroke="#E0E0E0" stroke-width="1"/>
  
  <!-- Header row highlighting -->
  <rect x="20" y="24" width="88" height="11" fill="#4CAF50" opacity="0.2" rx="2"/>
  
  <!-- Sample grade entries (checkmarks) -->
  <path d="M 42 42 L 45 45 L 50 40" stroke="#4CAF50" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 62 57 L 65 60 L 70 55" stroke="#4CAF50" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 82 72 L 85 75 L 90 70" stroke="#4CAF50" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- "SGS Bot" text centered inside grid -->
  <text x="64" y="70" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#FF9800">SGS Bot</text>
  
  <!-- Success checkmark in top right -->
  <circle cx="110" cy="16" r="10" fill="#4CAF50" stroke="#ffffff" stroke-width="2"/>
  <path d="M 105 16 L 108 19 L 115 12" stroke="#ffffff" stroke-width="3" fill="none" stroke-linecap="round"/>
</svg>